apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas
  namespace: despacho-project
  labels:
    app: back-ventas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Esperando a MySQL en $DB_HOST:3306..."
              until nc -z "$DB_HOST" 3306; do
                echo "MySQL no disponible, esperando 5s..."
                sleep 5
              done
              echo "MySQL listo!"
          envFrom:
            - configMapRef:
                name: app-config
        - name: create-schemas
          image: mysql:8-oracle
          command:
            - sh
            - -c
            - |
              echo "Creando esquemas en MySQL..."
              mysql -h "$DB_HOST" -u "$SPRING_DATASOURCE_USERNAME" -p"$SPRING_DATASOURCE_PASSWORD" -e "CREATE SCHEMA IF NOT EXISTS despachos; CREATE SCHEMA IF NOT EXISTS ventas;"
              echo "Esquemas creados correctamente!"
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: mysql-credentials
      containers:
        - name: back-ventas
          image: __ECR_REGISTRY__/__PROJECT_NAME__-backend-ventas:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: mysql-credentials
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas
  namespace: despacho-project
  labels:
    app: back-ventas
spec:
  type: ClusterIP
  selector:
    app: back-ventas
  ports:
    - name: http
      port: 8081
      targetPort: 8081
