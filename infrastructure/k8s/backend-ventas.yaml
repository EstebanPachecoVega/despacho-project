apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas
  namespace: despacho-project
  labels:
    app: back-ventas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      containers:
        - name: back-ventas
          image: __ECR_REGISTRY__/__PROJECT_NAME__-backend-ventas:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: mysql-credentials
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 768Mi
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas
  namespace: despacho-project
  labels:
    app: back-ventas
spec:
  type: ClusterIP
  selector:
    app: back-ventas
  ports:
    - name: http
      port: 8081
      targetPort: 8081
