apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: despacho-project
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: __ECR_REGISTRY__/__PROJECT_NAME__-frontend:__IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: BACKEND_DESPACHOS_HOST
              value: "back-despachos"
            - name: BACKEND_DESPACHOS_PORT
              value: "8080"
            - name: BACKEND_VENTAS_HOST
              value: "back-ventas"
            - name: BACKEND_VENTAS_PORT
              value: "8081"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: despacho-project
  labels:
    app: frontend
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
