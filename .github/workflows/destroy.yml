name: Destroy infraestructura

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Escribe "destroy" para confirmar la eliminación de TODA la infraestructura'
        required: true

jobs:
  destroy:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Obtener AWS Account ID
        run: |
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"

      - name: Restaurar cache de Terraform state
        uses: actions/cache@v4
        with:
          path: infrastructure/terraform/terraform.tfstate
          key: ${{ runner.os }}-terraform-state-${{ env.AWS_ACCOUNT_ID }}



      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Limpiar recursos de Kubernetes
        run: |
          aws eks update-kubeconfig --name despacho-project-eks --region us-east-1 || true
          kubectl delete namespace despacho-project --timeout=120s || true

      - name: Terraform Destroy
        working-directory: infrastructure/terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
          TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}
        run: |
          terraform init
          terraform destroy -auto-approve
