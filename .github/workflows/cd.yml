name: Despliegue continuo

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: despacho-project
  K8S_NAMESPACE: despacho-project
  DB_NAME: despachodb
  DB_USERNAME: despacho_app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Obtener AWS Account ID
        run: |
          echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_ENV"

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: infrastructure/terraform/.terraform
          key: ${{ runner.os }}-terraform-${{ hashFiles('infrastructure/terraform/*.tf') }}
          restore-keys: |
            ${{ runner.os }}-terraform-

      - name: Cache Terraform state
        uses: actions/cache@v4
        with:
          path: infrastructure/terraform/terraform.tfstate
          key: ${{ runner.os }}-terraform-state-${{ env.AWS_ACCOUNT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform Apply y capturar outputs
        id: tf
        working-directory: infrastructure/terraform
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
          TF_VAR_key_pair_name: ${{ secrets.KEY_PAIR_NAME }}
        run: |
          terraform init
          terraform apply -auto-approve
          echo "DB_HOST=$(terraform output -raw db_private_ip)" >> "$GITHUB_ENV"
          echo "AWS_ACCOUNT_ID=$(terraform output -raw aws_account_id)" >> "$GITHUB_ENV"
          echo "EKS_CLUSTER_NAME=$(terraform output -raw eks_cluster_name)" >> "$GITHUB_ENV"

      - name: Login en ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Definir imagenes
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Build y push backend despachos
        run: |
          docker build --platform linux/amd64 \
            -t "${ECR_REGISTRY}/${PROJECT_NAME}-backend-despachos:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${PROJECT_NAME}-backend-despachos:latest" \
            ./backend/despacho-service
          docker push "${ECR_REGISTRY}/${PROJECT_NAME}-backend-despachos:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${PROJECT_NAME}-backend-despachos:latest"

      - name: Build y push backend ventas
        run: |
          docker build --platform linux/amd64 \
            -t "${ECR_REGISTRY}/${PROJECT_NAME}-backend-ventas:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${PROJECT_NAME}-backend-ventas:latest" \
            ./backend/venta-service
          docker push "${ECR_REGISTRY}/${PROJECT_NAME}-backend-ventas:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${PROJECT_NAME}-backend-ventas:latest"

      - name: Build y push frontend
        run: |
          docker build --platform linux/amd64 \
            -t "${ECR_REGISTRY}/${PROJECT_NAME}-frontend:${IMAGE_TAG}" \
            -t "${ECR_REGISTRY}/${PROJECT_NAME}-frontend:latest" \
            ./frontend
          docker push "${ECR_REGISTRY}/${PROJECT_NAME}-frontend:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${PROJECT_NAME}-frontend:latest"

      - name: Configurar acceso a EKS
        run: |
          aws eks update-kubeconfig \
            --name "${EKS_CLUSTER_NAME}" \
            --region "${AWS_REGION}"

      - name: Crear Secret de MySQL
        run: |
          kubectl apply -f infrastructure/k8s/namespace.yaml
          kubectl -n "${K8S_NAMESPACE}" create secret generic mysql-credentials \
            --from-literal=SPRING_DATASOURCE_USERNAME="${DB_USERNAME}" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Renderizar y aplicar manifiestos Kubernetes
        run: |
          mkdir -p .k8s-rendered
          cp infrastructure/k8s/*.yaml .k8s-rendered/

          for file in .k8s-rendered/*.yaml; do
            sed -i \
              -e "s|__ECR_REGISTRY__|${ECR_REGISTRY}|g" \
              -e "s|__PROJECT_NAME__|${PROJECT_NAME}|g" \
              -e "s|__IMAGE_TAG__|${IMAGE_TAG}|g" \
              -e "s|__DB_HOST__|${DB_HOST}|g" \
              -e "s|__DB_NAME__|${DB_NAME}|g" \
              "$file"
          done

          kubectl apply -k .k8s-rendered
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/back-despachos --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/back-ventas --timeout=180s
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/frontend --timeout=180s
