services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  back-despachos:
    build: ./backend/despacho-service  
    ports:
      - "8080:8080"
    env_file:
      - ./backend/despacho-service/.env
    depends_on:
      mysql:
        condition: service_healthy

  back-ventas:
    build: ./backend/venta-service    
    ports:
      - "8081:8081" 
    env_file:
      - ./backend/venta-service/.env
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend                  
    ports:
      - "80:80"
    environment:
      BACKEND_DESPACHOS_HOST: back-despachos
      BACKEND_DESPACHOS_PORT: 8080
      BACKEND_VENTAS_HOST: back-ventas
      BACKEND_VENTAS_PORT: 8081
    depends_on:
      - back-despachos
      - back-ventas

volumes:
  mysql_data:
    name: despacho_mysql_data
